[build]
builder = "nixpacks"

[deploy]
startCommand = "python manage.py migrate && python create_demo_users.py && python test_admin_access.py && gunicorn bookclick.wsgi:application"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[[services]]
name = "web"

[services.variables]
PYTHON_VERSION = "3.13"
DJANGO_SETTINGS_MODULE = "bookclick.settings"

[[services.ports]]
port = 8000
handlers = ["http"]
