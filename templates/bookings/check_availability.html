{% extends 'base.html' %}
{% load static %}

{% block title %}Check Availability - BookClick{% endblock %}

{% block content %}
<div class="container">
    <div class="row mt-4">
        <div class="col-md-8 offset-md-2">
            <div class="card shadow">
                <div class="card-header bg-info text-white">
                    <h4 class="mb-0"><i class="fas fa-search"></i> Check Room Availability</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="form-group">
                            <label for="room_id"><i class="fas fa-door-open"></i> Select Room *</label>
                            <select class="form-control" id="room_id" name="room_id" required>
                                <option value="">Choose a room...</option>
                                {% for room in rooms %}
                                <option value="{{ room.id }}" {% if selected_room and selected_room.id == room.id %}selected{% endif %}>
                                    {{ room.name }} - {{ room.building }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="date"><i class="fas fa-calendar"></i> Date *</label>
                            <input type="date" class="form-control" id="date" name="date" required>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="start_time"><i class="fas fa-clock"></i> Start Time *</label>
                                    <input type="time" class="form-control" id="start_time" name="start_time" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="end_time"><i class="fas fa-clock"></i> End Time *</label>
                                    <input type="time" class="form-control" id="end_time" name="end_time" required>
                                </div>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-info btn-lg btn-block">
                            <i class="fas fa-search"></i> Check Availability
                        </button>
                    </form>
                </div>
            </div>
            
            <div class="text-center mt-3">
                <a href="{% url 'rooms_list' %}" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Back to Rooms
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$(document).ready(function() {
    // Set minimum date to today
    const today = new Date().toISOString().split('T')[0];
    $('#date').attr('min', today);
});
</script>
{% endblock %}
